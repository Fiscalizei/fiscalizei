<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiscalizei - Criar Tarefa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="cadastrotarefa.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">
            <img src="logo_fiscalizei.png" alt="logo">
        </div>
        
        <div class="menu-icons">
            <i class='bx bx-bar-chart-alt-2'></i>
            <i class='bx bx-plus active'></i>
            <i class='bx bx-check-circle'></i>
        </div>

        <div class="user-footer">
            <i class='bx bx-user-circle'></i>
        </div>
    </nav>

    <main class="content-area">
        <h1 class="page-title">Criar tarefa</h1>

        <form class="task-form">
            <div class="input-group">
                <label>Nome Tarefa</label>
                <input type="text" placeholder="Digite o nome da tarefa">
            </div>

            <div class="input-group">
                <label>Descrição</label>
                <textarea rows="4" placeholder="Escreva a descrição..."></textarea>
            </div>

            <div class="input-group">
                <label>Recorrência ⌵</label>
                <select>
                    <option disabled selected>Valor escolhido</option>
                    <option>Diária</option>
                    <option>Semanal</option>
                </select>
            </div>

            <div class="input-group">
                <label>Atribuição ⌵</label>
                <select>
                    <option disabled selected>Valor escolhido</option>
                    <option>Fiscal 01</option>
                    <option>Fiscal 02</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">Criar tarefa</button>
        </form>
    </main>

</body>
</html>
