<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="stylesheet" href="style.css" />
  <title>Perfil</title>
</head>
<body>
  <div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <img src="logo.png" alt="logo">
      </div>

      <nav class="menu">
        <i class="fa-solid fa-chart-column"></i>
        <i class="fa-solid fa-plus"></i>
        <i class="fa-solid fa-circle-check"></i>
      </nav>

      <div class="perfil-icon">
        <i class="fa-regular fa-circle-user"></i>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <h1>Perfil</h1>

<div class="profile">
  <div class="avatar" id="avatar">
    <i class="fa-regular fa-user"></i>
    <input type="file" id="upload" accept="image/*">
  </div>
  <label for="upload" class="camera-icon">
    <i class="fa-solid fa-camera"></i>
  </label>
</div>


      <form id="profileForm">
        <div class="form-group">
          <label for="nome">Nome</label>
          <div class="input-wrapper">
            <input type="text" id="nome" placeholder="Digite seu nome">
            <i class="fa-solid fa-pencil edit-icon"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="Digite seu email">
            <i class="fa-solid fa-pencil edit-icon"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="input-wrapper">
            <input type="password" id="senha" placeholder="Digite sua senha">
            <i class="fa-solid fa-pencil edit-icon"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="empresa">Empresa</label>
          <div class="input-wrapper">
            <input type="text" id="empresa" placeholder="Digite sua empresa">
            <i class="fa-solid fa-pencil edit-icon"></i>
          </div>
        </div>

        <div class="buttons">
          <button type="button" class="save-btn" onclick="salvarPerfil()">Salvar</button>
          <button type="reset" class="back-btn">Voltar</button>
        </div>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
