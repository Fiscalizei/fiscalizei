<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiscalizei - Tarefa Aprovada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="tarefaaprovada.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">
            <img src="logo_fiscalizei.png" alt="logo">
        </div>
        
        <div class="menu-icons">
            <i class='bx bx-bar-chart-alt-2'></i>
            <i class='bx bx-plus'></i>
            <i class='bx bx-check-circle active'></i> </div>

        <div class="user-footer">
            <i class='bx bx-user-circle'></i>
        </div>
    </nav>

    <main class="content-area">
        <div class="success-container">
            <div class="success-icon">
                <i class='bx bxs-check-circle'></i>
            </div>
            
            <h1 class="success-title">Tarefa aprovada!</h1>
            <p class="success-message">A tarefa foi enviada e aprovada com sucesso no sistema.</p>

            <div class="button-group">
                <button onclick="window.location.href='cadastrotarefa.html'" class="btn-outline">Criar nova</button>
                <button class="btn-primary">Ver tarefas</button>
            </div>
        </div>
    </main>

</body>
</html>
