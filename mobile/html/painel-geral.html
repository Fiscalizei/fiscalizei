<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISCALIZEI - Painel Geral</title>
    <link rel="stylesheet" href="../css/home-estoquista.css">
    <link rel="stylesheet" href="../css/painel-geral.css">
    <link rel="stylesheet" href="../css/sidebar.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <img class="logo-text" src="../../assetsport/logoMobile.svg" alt="Fiscalizei">
        </div>
        <div class="menu-btn" onclick="sidebarAbrir()">☰</div>
    </div>

    <div class="painel-container">
        <h1 class="title" style="padding: 20px 0 16px;">Painel Geral:</h1>

        <div class="painel-card">
            <p class="painel-card-titulo">Progressão da Meta Diária</p>
            <div class="barra-fundo">
                <div class="barra-progresso" id="barraProgresso"></div>
            </div>
            <p class="barra-legenda" id="barraLegenda"></p>
            <p class="painel-sync" id="painelSync"></p>
        </div>

        <button class="btn-voltar" onclick="voltarParaLista()">Voltar</button>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/painel-geral.js"></script>
</body>
</html>
