<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiscalizei - Aprovação de Tarefas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="aprovacaotarefa.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">
            <img src="logo_fiscalizei.png" alt="logo">
        </div>
        
        <div class="menu-icons">
            <i class='bx bx-bar-chart-alt-2'></i>
            <i class='bx bx-plus'></i>
            <i class='bx bx-check-circle active'></i>
        </div>

        <div class="user-footer">
            <i class='bx bx-user-circle'></i>
        </div>
    </nav>

    <main class="content-area">
        <h1 class="page-title">Aprovação de tarefas</h1>

        <section class="approval-container">
            <div class="image-section">
                <h3>Foto enviada</h3>
                <div class="task-image">
                    <img src="estoque.jpeg" alt="Foto do estoque">
                </div>
                <p class="timestamp">Horário do envio: 00:00:00 - 00/00/0000</p>
            </div>

            <div class="comment-section">
                <h3>Comentário</h3>
                <div class="comment-box">
                    Realizado o estoque de mercadoria x, segue a foto em anexo
                </div>
            </div>

            <div class="actions">
                <button class="btn-reprovar">Reprovar</button>
                <button class="btn-aprovar">Aprovar</button>
            </div>

            <button onclick="history.back()" class="btn-voltar">Voltar</button>
        </section>
    </main>

</body>
</html>
